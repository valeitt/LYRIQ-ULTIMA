databaseChangeLog:

  - changeSet:
      id: 1
      author: Vale

      changes:

        - createTable:
            tableName: recommendations

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: song_id
                  type: BIGINT

              - column:
                  name: score
                  type: DOUBLE

  - changeSet:
      id: 2
      author: Vale

      changes:

        - insert:
            tableName: recommendations
            columns:
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: song_id, valueNumeric: 1}
              - column: {name: score, valueNumeric: 9.5}

        - insert:
            tableName: recommendations
            columns:
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: song_id, valueNumeric: 2}
              - column: {name: score, valueNumeric: 8.8}

        - insert:
            tableName: recommendations
            columns:
              - column: {name: user_id, valueNumeric: 2}
