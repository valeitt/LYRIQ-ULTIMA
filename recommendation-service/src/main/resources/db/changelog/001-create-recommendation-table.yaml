databaseChangeLog:

  - changeSet:
      id: 1
      author: Vale

      changes:

        - createTable:
            tableName: recommendations

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: song_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: score
                  type: DOUBLE
                  constraints:
                    nullable: false