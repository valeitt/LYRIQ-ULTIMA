databaseChangeLog:

  - changeSet:
      id: 1
      author: Vale

      changes:

        - createTable:
            tableName: playlist_songs

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: playlist_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: song_id
                  type: BIGINT
                  constraints:
                    nullable: false