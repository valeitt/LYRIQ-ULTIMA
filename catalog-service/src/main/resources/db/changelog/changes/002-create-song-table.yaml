databaseChangeLog:

  - changeSet:
      id: 2
      author: vale

      changes:

        - createTable:
            tableName: songs

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)

              - column:
                  name: artist
                  type: VARCHAR(255)

              - column:
                  name: album
                  type: VARCHAR(255)

              - column:
                  name: image_url
                  type: VARCHAR(500)

              - column:
                  name: genre_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: songs
            baseColumnNames: genre_id

            referencedTableName: genres
            referencedColumnNames: id

            constraintName: fk_song_genre