# =============================================
# ARTIST SERVICE — Configuración común
# Para ejecutar localmente: -Dspring.profiles.active=local
# Para Docker: SPRING_PROFILES_ACTIVE=docker (docker-compose lo setea)
# =============================================

spring.application.name=artist-service
spring.profiles.default=local

server.port=7079

# JPA — configuración común (sin URL de BD)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml