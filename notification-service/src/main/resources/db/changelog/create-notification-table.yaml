databaseChangeLog:

  - changeSet:
      id: 1
      author: Vale

      changes:

        - createTable:
            tableName: notifications

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: message
                  type: VARCHAR(255)

              - column:
                  name: created_at
                  type: DATETIME

  - changeSet:
      id: 2
      author: Vale

      changes:

        - insert:
            tableName: notifications
            columns:
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: message, value: "Canción agregada a favoritos"}
              - column: {name: created_at, valueDate: "2026-01-01T10:00:00"}

