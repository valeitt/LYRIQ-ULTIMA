x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: docker

services:

  # ─── BASE DE DATOS ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # ─── API GATEWAY ─────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "7070:7070"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      catalog-service:
        condition: service_started
      auth-service:
        condition: service_started
      swipe-service:
        condition: service_started
      favorites-service:
        condition: service_started
      history-service:
        condition: service_started
      playlist-service:
        condition: service_started
      playlist-song-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      artist-service:
        condition: service_started
      notification-service:
        condition: service_started

  # ─── MICROSERVICIOS ──────────────────────────────────────────
  catalog-service:
    build: ./catalog-service
    ports:
      - "7071:7071"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "7072:7072"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  swipe-service:
    build: ./swipe-service
    ports:
      - "7073:7073"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  favorites-service:
    build: ./favorites-service
    ports:
      - "7074:7074"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  history-service:
    build: ./history-service
    ports:
      - "7075:7075"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  playlist-service:
    build: ./playlist-service
    ports:
      - "7076:7076"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  playlist-song-service:
    build: ./playlist-song-service
    ports:
      - "7077:7077"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  recommendation-service:
    build: ./recommendation-service
    ports:
      - "7078:7078"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  artist-service:
    build: ./artist-service
    ports:
      - "7079:7079"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    ports:
      - "7080:7080"
    environment:
      <<: *common-env
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy