x-common-env: &common-env
  SECRET: "mi_clave_super_secreta_para_jwt_2026_123456789"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
    ports:
      - "3306:3306"

  api-gateway:
    build: ./api-gateway
    ports:
      - "7070:7070"
    environment:
      <<: *common-env
    depends_on:
      - mysql
      - catalog-service
      - auth-service
      - swipe-service
      - favorites-service
      - history-service
      - playlist-service
      - playlist-song-service
      - recommendation-service
      - artist-service
      - notification-service

  catalog-service:
    build: ./catalog-service
    ports:
      - "7071:7071"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  auth-service:
    build: ./auth-service
    ports:
      - "7072:7072"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  swipe-service:
    build: ./swipe-service
    ports:
      - "7073:7073"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  favorites-service:
    build: ./favorites-service
    ports:
      - "7074:7074"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  history-service:
    build: ./history-service
    ports:
      - "7075:7075"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  playlist-service:
    build: ./playlist-service
    ports:
      - "7076:7076"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  playlist-song-service:
    build: ./playlist-song-service
    ports:
      - "7077:7077"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  recommendation-service:
    build: ./recommendation-service
    ports:
      - "7078:7078"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  artist-service:
    build: ./artist-service
    ports:
      - "7079:7079"
    environment:
      <<: *common-env
    depends_on:
      - mysql

  notification-service:
    build: ./notification-service
    ports:
      - "7080:7080"
    environment:
      <<: *common-env
    depends_on:
      - mysql