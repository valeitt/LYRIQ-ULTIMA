server:
  port: 7070

spring:
  application:
    name: api-gateway
  profiles:
    default: local

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # ─── CATALOG SERVICE ───────────────────────────
            - id: song-docs
              uri: ${services.catalog}
              predicates:
                - Path=/songs/v3/api-docs
              filters:
                - RewritePath=/songs/v3/api-docs,/v3/api-docs

            - id: song-service
              uri: ${services.catalog}
              predicates:
                - Path=/songs/**

            - id: genre-docs
              uri: ${services.catalog}
              predicates:
                - Path=/genres/v3/api-docs
              filters:
                - RewritePath=/genres/v3/api-docs,/v3/api-docs

            - id: genre-service
              uri: ${services.catalog}
              predicates:
                - Path=/genres/**

            # ─── AUTH SERVICE ──────────────────────────────
            - id: auth-docs
              uri: ${services.auth}
              predicates:
                - Path=/auth/v3/api-docs
              filters:
                - RewritePath=/auth/v3/api-docs,/v3/api-docs

            - id: auth-service
              uri: ${services.auth}
              predicates:
                - Path=/auth/**

            # ─── SWIPE SERVICE ─────────────────────────────
            - id: swipe-docs
              uri: ${services.swipe}
              predicates:
                - Path=/swipes/v3/api-docs
              filters:
                - RewritePath=/swipes/v3/api-docs,/v3/api-docs

            - id: swipe-service
              uri: ${services.swipe}
              predicates:
                - Path=/swipes/**

            # ─── FAVORITES SERVICE ─────────────────────────
            - id: favorites-docs
              uri: ${services.favorites}
              predicates:
                - Path=/favorites/v3/api-docs
              filters:
                - RewritePath=/favorites/v3/api-docs,/v3/api-docs

            - id: favorites-service
              uri: ${services.favorites}
              predicates:
                - Path=/favorites/**

            # ─── HISTORY SERVICE ───────────────────────────
            - id: history-docs
              uri: ${services.history}
              predicates:
                - Path=/history/v3/api-docs
              filters:
                - RewritePath=/history/v3/api-docs,/v3/api-docs

            - id: history-service
              uri: ${services.history}
              predicates:
                - Path=/history/**

            # ─── PLAYLIST SERVICE ──────────────────────────
            - id: playlist-docs
              uri: ${services.playlist}
              predicates:
                - Path=/playlists/v3/api-docs
              filters:
                - RewritePath=/playlists/v3/api-docs,/v3/api-docs

            - id: playlist-service
              uri: ${services.playlist}
              predicates:
                - Path=/playlists/**

            # ─── PLAYLIST-SONG SERVICE ─────────────────────
            - id: playlist-song-docs
              uri: ${services.playlist-song}
              predicates:
                - Path=/playlist-songs/v3/api-docs
              filters:
                - RewritePath=/playlist-songs/v3/api-docs,/v3/api-docs

            - id: playlist-song-service
              uri: ${services.playlist-song}
              predicates:
                - Path=/playlist-songs/**

            # ─── RECOMMENDATION SERVICE ────────────────────
            - id: recommendation-docs
              uri: ${services.recommendation}
              predicates:
                - Path=/recommendations/v3/api-docs
              filters:
                - RewritePath=/recommendations/v3/api-docs,/v3/api-docs

            - id: recommendation-service
              uri: ${services.recommendation}
              predicates:
                - Path=/recommendations/**

            # ─── ARTIST SERVICE ────────────────────────────
            - id: artist-docs
              uri: ${services.artist}
              predicates:
                - Path=/artists/v3/api-docs
              filters:
                - RewritePath=/artists/v3/api-docs,/v3/api-docs

            - id: artist-service
              uri: ${services.artist}
              predicates:
                - Path=/artists/**

            # ─── NOTIFICATION SERVICE ──────────────────────
            - id: notification-docs
              uri: ${services.notification}
              predicates:
                - Path=/notifications/v3/api-docs
              filters:
                - RewritePath=/notifications/v3/api-docs,/v3/api-docs

            - id: notification-service
              uri: ${services.notification}
              predicates:
                - Path=/notifications/**

# ─── SPRINGDOC / SWAGGER ───────────────────────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Songs
        url: /songs/v3/api-docs
      - name: Genres
        url: /genres/v3/api-docs
      - name: Auth
        url: /auth/v3/api-docs
      - name: Swipes
        url: /swipes/v3/api-docs
      - name: Favorites
        url: /favorites/v3/api-docs
      - name: History
        url: /history/v3/api-docs
      - name: Playlists
        url: /playlists/v3/api-docs
      - name: Playlist Songs
        url: /playlist-songs/v3/api-docs
      - name: Recommendations
        url: /recommendations/v3/api-docs
      - name: Artists
        url: /artists/v3/api-docs
      - name: Notifications
        url: /notifications/v3/api-docs

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG