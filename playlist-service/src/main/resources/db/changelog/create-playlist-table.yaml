databaseChangeLog:

  - changeSet:
      id: 1
      author: Vale

      
      changes:

        - createTable:
            tableName: playlists

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT

              - column:
                  name: name
                  type: VARCHAR(255)

              - column:
                  name: description
                  type: VARCHAR(255)


